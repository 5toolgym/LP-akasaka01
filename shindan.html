<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #020202;
    --surface: #0a0a0a;
    --surface2: #111111;
    --accent: #00ff7f;
    --accent2: #00e5ff;
    --text: #e8f5e8;
    --muted: #4a6a4a;
    --border: #0a2a0a;
    --radius: 16px;
  }

  body {

    color: var(--text);

    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .container {
    max-width: 600px;
    width: 100%;
  }

  /* ===== INTRO ===== */
  .intro {
    text-align: center;
    padding: 48px 24px;
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .intro::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(0,255,127,0.2) 0%, transparent 70%);
    pointer-events: none;
  }
  .intro::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -60px;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .intro-label {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    background: rgba(0,255,127,0.08);
    border: 1px solid rgba(0,255,127,0.3);
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 24px;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(0,255,127,0.6);
  }
  .intro h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .intro h2 span {
    color: var(--accent);
  }
  .intro p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 32px;
  }
  .btn-start {
    display: inline-block;
    background: var(--accent);
    color: #020202;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 16px;
    padding: 18px 48px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px rgba(0,255,127,0.5), 0 0 60px rgba(0,255,127,0.2);
    text-shadow: 0 0 10px rgba(0,255,127,0.3);
  }
  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0,255,127,0.7), 0 0 80px rgba(0,255,127,0.35);
  }
  .btn-start:active { transform: translateY(0); }
  .intro-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
  }

  /* ===== QUIZ ===== */
  .quiz { display: none; }
  .quiz.active { display: block; }

  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .progress-bar-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 24px;
    animation: slideIn 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-num {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .q-text {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(17px, 4vw, 22px);
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .q-emoji {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-btn:hover {
    border-color: var(--accent);
    background: rgba(0,255,127,0.06);
    transform: translateX(4px);
    box-shadow: 0 0 12px rgba(0,255,127,0.15);
  }
  .option-btn .opt-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 32px;
    text-align: center;
  }
  .option-btn .opt-text { flex: 1; }

  /* ===== RESULT ===== */
  .result { display: none; }
  .result.active { display: block; animation: slideIn 0.4s cubic-bezier(0.4,0,0.2,1); }

  .result-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 32px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  .result-header::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(0,255,127,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .result-tag {
    display: inline-block;
    background: var(--accent);
    color: #020202;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 100px;
    text-transform: uppercase;
    margin-bottom: 16px;
    box-shadow: 0 0 16px rgba(0,255,127,0.5);
  }
  .result-type {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .result-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .result-title span { color: var(--accent); }
  .result-emoji { font-size: 48px; margin-bottom: 12px; display: block; }

  .result-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 24px;
  }
  .result-desc {
    font-size: 14px;
    line-height: 1.9;
    color: #a8c8a8;
    margin-bottom: 24px;
  }

  .result-issues {
    background: var(--surface2);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .result-issues-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .issue-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
  }
  .issue-item:last-child { margin-bottom: 0; }
  .issue-dot {
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 7px;
  }

  .result-approach {
    background: rgba(0,255,127,0.05);
    border: 1px solid rgba(0,255,127,0.2);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .result-approach-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .approach-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
  }
  .approach-item:last-child { margin-bottom: 0; }
  .approach-num {
    background: var(--accent);
    color: #0e0e0e;
    font-weight: 900;
    font-size: 11px;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .result-cta {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 24px 24px;
    padding: 24px;
    text-align: center;
  }
  .cta-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .cta-heading {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .btn-cta {
    display: block;
    width: 100%;
    background: var(--accent);
    color: #020202;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 15px;
    padding: 18px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    margin-bottom: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
    text-decoration: none;
    box-shadow: 0 0 20px rgba(0,255,127,0.45), 0 0 60px rgba(0,255,127,0.15);
  }
  .btn-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0,255,127,0.65), 0 0 80px rgba(0,255,127,0.25);
  }
  .btn-retry {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--muted);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-retry:hover { color: var(--text); border-color: var(--muted); }

  /* 店舗選択 */
  .store-select {
    margin-bottom: 16px;
  }
  .store-select-label {
    font-size: 13px;
    color: var(--text);
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .store-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .store-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    background: var(--surface2);
    border: 2px solid rgba(0,255,127,0.4);
    border-radius: 16px;
    padding: 22px 24px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    width: 100%;
    box-shadow: 0 0 16px rgba(0,255,127,0.1), inset 0 0 20px rgba(0,255,127,0.03);
    position: relative;
    overflow: hidden;
  }
  .store-btn::before {
    content: '→';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 20px;
    opacity: 0.6;
    transition: all 0.2s;
  }
  .store-btn:hover {
    border-color: var(--accent);
    background: rgba(0,255,127,0.08);
    box-shadow: 0 0 30px rgba(0,255,127,0.3), inset 0 0 30px rgba(0,255,127,0.05);
    transform: translateY(-3px);
  }
  .store-btn:hover::before {
    right: 16px;
    opacity: 1;
  }
  .store-btn-name {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--accent);
    text-shadow: 0 0 16px rgba(0,255,127,0.6);
    letter-spacing: 1px;
  }
  .store-btn-desc {
    font-size: 12px;
    color: #6a8a6a;
    line-height: 1.6;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <!-- INTRO -->
  <div class="intro" id="intro">
    <div class="intro-label">✦ Body Check</div>
    <h2>あなたの体に<span>何が足りない？</span><br>5問でわかる診断</h2>
    <p>腰痛・疲れ・体型崩れ・運動不足…<br>原因は人それぞれ違います。<br>タップするだけで、あなたに必要なトレーニングがわかります。</p>
    <button class="btn-start" onclick="startQuiz()">診断スタート →</button>
    <p class="intro-note">所要時間：約30秒 ／ 登録不要</p>
  </div>

  <!-- QUIZ -->
  <div class="quiz" id="quiz">
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">1 / 5</div>
    </div>
    <div class="question-card" id="questionCard"></div>
  </div>

  <!-- RESULT -->
  <div class="result" id="result">
    <div class="result-header">
      <div class="result-tag">診断結果</div>
      <span class="result-emoji" id="resultEmoji"></span>
      <div class="result-type" id="resultType"></div>
      <div class="result-title" id="resultTitle"></div>
    </div>
    <div class="result-body">
      <div class="result-desc" id="resultDesc"></div>
      <div class="result-issues">
        <div class="result-issues-title">⚠ あなたに起きやすいこと</div>
        <div id="resultIssues"></div>
      </div>
      <div class="result-approach">
        <div class="result-approach-title">✦ 5toolgymが提案するアプローチ</div>
        <div id="resultApproach"></div>
      </div>
    </div>
    <div class="result-cta">
      <div class="cta-label">次のステップ</div>
      <div class="cta-heading" id="ctaHeading"></div>
      <div class="store-select" id="storeSelect">
        <div class="store-select-label">通いやすい店舗を選んでください</div>
        <div class="store-btns">
          <button class="store-btn" onclick="goToLP('yakuin')">
            <span class="store-btn-name">薬院店</span>
            <span class="store-btn-desc">24時間ジム付き｜薬院大通駅・薬院駅・平尾駅が近い方</span>
          </button>
          <button class="store-btn" onclick="goToLP('akasaka')">
            <span class="store-btn-name">赤坂・大濠公園店</span>
            <span class="store-btn-desc">完全個室｜赤坂駅・大濠公園駅・天神駅が近い方</span>
          </button>
        </div>
      </div>
      <button class="btn-retry" onclick="retryQuiz()">もう一度診断する</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    emoji: "🧍",
    text: "最近、体のどこかに「違和感」を感じますか？",
    options: [
      { icon: "😣", text: "腰や首・肩がよく痛む・重い", tags: ["pain"] },
      { icon: "😴", text: "疲れやすい・だるさが抜けない", tags: ["fatigue"] },
      { icon: "😕", text: "姿勢が悪いとよく言われる", tags: ["posture"] },
      { icon: "🙂", text: "特に違和感はない", tags: ["goal"] },
    ]
  },
  {
    emoji: "🎯",
    text: "今、一番叶えたいことはどれですか？",
    options: [
      { icon: "⚡", text: "痩せたい・体型を変えたい", tags: ["diet"] },
      { icon: "💪", text: "筋肉をつけて引き締めたい", tags: ["muscle"] },
      { icon: "🏃", text: "体力・動ける体をつくりたい", tags: ["functional"] },
      { icon: "🌿", text: "痛みや不調を改善したい", tags: ["rehab"] },
    ]
  },
  {
    emoji: "🧠",
    text: "仕事や生活のスタイルに近いのは？",
    options: [
      { icon: "💻", text: "デスクワークが多く、座りっぱなし", tags: ["sedentary", "posture"] },
      { icon: "🚶", text: "立ち仕事・移動が多い", tags: ["fatigue"] },
      { icon: "🏠", text: "家にいる時間が長く、運動不足を感じる", tags: ["sedentary", "diet"] },
      { icon: "⚽", text: "たまにスポーツや運動をしている", tags: ["functional"] },
    ]
  },
  {
    emoji: "🛌",
    text: "睡眠・疲労の回復について当てはまるのは？",
    options: [
      { icon: "😪", text: "寝ても疲れが取れないことが多い", tags: ["fatigue", "pain"] },
      { icon: "🌙", text: "寝つきが悪い・眠りが浅い", tags: ["fatigue"] },
      { icon: "✅", text: "睡眠は特に問題ない", tags: ["goal", "muscle"] },
      { icon: "🤔", text: "あまり気にしたことがなかった", tags: ["goal"] },
    ]
  },
  {
    emoji: "🏋️",
    text: "これまでの運動経験はどのくらいですか？",
    options: [
      { icon: "🔰", text: "ほぼなし・久しぶり", tags: ["beginner", "posture"] },
      { icon: "🚶", text: "ウォーキング程度はしている", tags: ["functional"] },
      { icon: "🏃", text: "ジムや運動を少しやっていた", tags: ["muscle"] },
      { icon: "💪", text: "わりと継続的に運動してきた", tags: ["muscle", "functional"] },
    ]
  }
];

const results = {
  rehab: {
    emoji: "🔧",
    type: "タイプA ／ 機能回復型",
    title: "<span>まず「痛みと歪み」を</span>リセットするべきです",
    desc: "あなたはカラダの緊張が強く、長年の姿勢や動きのクセでカラダに結構な負担がかかっています。鍛えることも重要ですが、まず今の段階ではハードに鍛えるよりも、カラダの緊張を抜いて、力をコントロールし、カラダへの負担を少なくすることが最重要です。カラダへの負担がかからない状態を運動とコンディショニングで作っていきましょう。そうすることで、不調が減り、日々が過ごしやすくなります。緊張が強いカラダのまま鍛え続けると、負担はさらに蓄積し、ある日突然動けなくなるリスクがあります。",
    issues: [
      "筋肉のアンバランスによる慢性的な腰痛・肩こり",
      "関節への負担が大きく、普通の運動でも痛みが出やすい",
      "姿勢の崩れが内臓の圧迫・代謝低下を招いている可能性"
    ],
    approach: [
      "コンディショニング：カラダの無駄な緊張をとることが必要です。特に背面の筋肉がかなり緊張し、前面の筋肉は上手に働いていません。筋肉の緊張のバランスを整えます。",
      "トレーニング：動きを鍛える必要があります。下半身で床を押す動きや上半身で物を押す動きから鍛える必要があります。",
      "姿勢：筋肉でガチガチに固めて立っている状態なので、自然と楽に立てる状態をつくります。その後、歩行や様々な運動でも良い姿勢で動ける状態にするアプローチをおこないます。"
    ],
    cta: {
      heading: "まずはあなた自身のクセを知り、<br>解決できるイメージを体験してみませんか？",
      button: "体験セッションを予約する（¥5,500）"
    }
  },
  diet_posture: {
    emoji: "🔥",

let currentQ = 0;
let scores = {};

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const fill = ((currentQ) / questions.length) * 100;
  document.getElementById('progressFill').style.width = fill + '%';
  document.getElementById('progressLabel').textContent = (currentQ + 1) + ' / ' + questions.length;

  const card = document.getElementById('questionCard');
  card.innerHTML = `
    <div class="q-num">Q${currentQ + 1}</div>
    <span class="q-emoji">${q.emoji}</span>
    <div class="q-text">${q.text}</div>
    <div class="options">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(${i})">
          <span class="opt-icon">${opt.icon}</span>
          <span class="opt-text">${opt.text}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function selectOption(idx) {
  const tags = questions[currentQ].options[idx].tags;
  tags.forEach(t => { scores[t] = (scores[t] || 0) + 1; });

  currentQ++;
  if (currentQ < questions.length) {
    document.getElementById('progressFill').style.width = (currentQ / questions.length * 100) + '%';
    document.getElementById('progressLabel').textContent = (currentQ + 1) + ' / ' + questions.length;
    document.getElementById('questionCard').style.animation = 'none';
    setTimeout(() => {
      document.getElementById('questionCard').style.animation = '';
      renderQuestion();
    }, 50);
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('quiz').classList.remove('active');

  // スコアで結果を決定
  const priority = [
    { key: 'pain',      type: 'rehab' },
    { key: 'rehab',     type: 'rehab' },
    { key: 'fatigue',   type: 'fatigue' },
    { key: 'beginner',  type: 'beginner' },
    { key: 'diet',      type: 'diet_posture' },
    { key: 'posture',   type: 'diet_posture' },
    { key: 'muscle',    type: 'muscle' },
    { key: 'sedentary', type: 'diet_posture' },
    { key: 'functional',type: 'functional' },
    { key: 'goal',      type: 'muscle' },
  ];

  let bestType = 'beginner';
  let bestScore = 0;
  for (const p of priority) {
    const s = scores[p.key] || 0;
    if (s > bestScore) { bestScore = s; bestType = p.type; }
  }

  const r = results[bestType];
  currentType = bestType;
  document.getElementById('resultEmoji').textContent = r.emoji;
  document.getElementById('resultType').textContent = r.type;
  document.getElementById('resultTitle').innerHTML = r.title;
  document.getElementById('resultDesc').textContent = r.desc;

  document.getElementById('resultIssues').innerHTML = r.issues.map(i =>
    `<div class="issue-item"><div class="issue-dot"></div><div>${i}</div></div>`
  ).join('');
  document.getElementById('resultApproach').innerHTML = r.approach.map((a, i) =>
    `<div class="approach-item"><div class="approach-num">${i+1}</div><div>${a}</div></div>`
  ).join('');

  document.getElementById('ctaHeading').innerHTML = r.cta.heading;

  document.getElementById('result').classList.add('active');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  gtag('event', 'shindan_result', {
    result_type: bestType
  });
}

  });

function retryQuiz() {
  gtag('event', 'shindan_retry');
  currentQ = 0;
  scores = {};
  document.getElementById('result').classList.remove('active');
  document.getElementById('quiz').classList.add('active');
  renderQuestion();
  document.getElementById('quiz').scrollIntoView({ behavior: 'smooth' });
